services:
  xinference:
    image: xprobe/xinference:latest-cpu
    container_name: xinference
    restart: always
    ports:
      - "9997:9997"
    volumes:
      - ./cache:/root/.xinference
    environment:
      - XINFERENCE_MODEL_SRC=modelscope
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
    command: xinference-local -H 0.0.0.0 --port 9997
